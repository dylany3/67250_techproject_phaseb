<!DOCTYPE html>
<html lang="en"></html>
<head>
  <script src="../static/script.js" defer></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="Dylan Yang" />
  <meta
    name="keywords"
    content="Museum, Carnegie Mellon University, Information Systems"
  />
  <meta name="description" content="MonoMuse website redesign project" />
  <title>Checkout - MonoMuse</title>
  <link rel="stylesheet" href="../static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
</head>

<body onload="addYear()">
  <header>
    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo"> 
    <nav id="navbar">
      <a href="../index.html">Home</a>
      <a href="explore.html">Explore</a>
      <a href="exhibitions.html">Exhibitions</a>
      <a href="tickets.html">Tickets</a>
      <a id="navselected" href="checkout.html">Checkout</a>
    </nav>
  </header>
  <div class="main">
    <h2>Checkout</h2>
    <form action="#" method="post">
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" required /><br /><br />

      <label for="email">Email:</label><br />
      <input type="email" id="email" name="email" required /><br /><br />

      <label for="quantity">Ticket Quantity:</label><br />
      <input
        type="number"
        id="quantity"
        name="quantity"
        min="1"
        required
      /><br /><br />

      <input type="submit" value="Submit" />
    </form>
  </div>
  <footer>
    <p id="copyYear"></p>
    <p>&copy; MonoMuse. All rights reserved.</p>
  </footer>
</body>
